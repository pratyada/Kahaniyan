<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 630" width="1200" height="630">
  <defs>
    <linearGradient id="sky" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#0a0a0f"/>
      <stop offset="60%" stop-color="#141420"/>
      <stop offset="100%" stop-color="#1c1c2a"/>
    </linearGradient>
    <radialGradient id="glow" cx="50%" cy="45%" r="50%">
      <stop offset="0%" stop-color="rgba(240,165,0,0.25)"/>
      <stop offset="100%" stop-color="rgba(240,165,0,0)"/>
    </radialGradient>
    <radialGradient id="moonG" cx="35%" cy="35%" r="65%">
      <stop offset="0%" stop-color="#ffd98a"/>
      <stop offset="55%" stop-color="#f0a500"/>
      <stop offset="100%" stop-color="#b87f00"/>
    </radialGradient>
  </defs>

  <rect width="1200" height="630" fill="url(#sky)"/>
  <rect width="1200" height="630" fill="url(#glow)"/>

  <!-- Stars -->
  <g fill="#f5f0e8">
    <circle cx="80" cy="60" r="1.5"/><circle cx="200" cy="120" r="1"/><circle cx="340" cy="50" r="1.8"/>
    <circle cx="520" cy="90" r="1.2"/><circle cx="680" cy="45" r="1.6"/><circle cx="850" cy="110" r="1"/>
    <circle cx="1020" cy="70" r="1.4"/><circle cx="1140" cy="130" r="0.9"/><circle cx="150" cy="200" r="1.1"/>
    <circle cx="400" cy="180" r="0.8"/><circle cx="750" cy="170" r="1.3"/><circle cx="950" cy="200" r="1"/>
    <circle cx="1100" cy="250" r="1.5"/><circle cx="60" cy="350" r="0.9"/><circle cx="300" cy="400" r="1.2"/>
  </g>

  <!-- Moon -->
  <g transform="translate(600,200)">
    <circle r="90" fill="url(#moonG)" opacity="0.95"/>
    <circle cx="30" cy="-15" r="78" fill="#0a0a0f"/>
  </g>

  <!-- Sleeping child silhouette (simple) -->
  <g transform="translate(540,420)" fill="#1c1c2a" stroke="#f0a500" stroke-width="1.5" opacity="0.6">
    <ellipse cx="60" cy="0" rx="80" ry="25"/>
    <circle cx="20" cy="-15" r="18"/>
  </g>

  <!-- Title -->
  <text x="600" y="370" text-anchor="middle" font-family="Georgia, serif" font-size="72" font-weight="700" fill="#f5f0e8">
    My Sleepy Tale
  </text>

  <!-- Tagline -->
  <text x="600" y="420" text-anchor="middle" font-family="Helvetica, Arial, sans-serif" font-size="26" font-weight="400" fill="#a8a39a">
    Bedtime stories that grow with your child
  </text>

  <!-- Features line -->
  <text x="600" y="530" text-anchor="middle" font-family="Helvetica, Arial, sans-serif" font-size="18" fill="#6e6a63">
    Personalized · AI-narrated · Culturally rooted · One tap to sleep
  </text>

  <!-- CTA pill -->
  <g transform="translate(460,555)">
    <rect rx="999" ry="999" width="280" height="48" fill="#f0a500"/>
    <text x="140" y="31" text-anchor="middle" font-family="Helvetica, Arial, sans-serif" font-size="16" font-weight="700" fill="#0a0a0f" letter-spacing="1.5">TRY IT FREE</text>
  </g>
</svg>
