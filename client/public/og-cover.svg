<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 630" width="1200" height="630">
  <defs>
    <linearGradient id="sky" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#0a0a0f"/>
      <stop offset="60%" stop-color="#141420"/>
      <stop offset="100%" stop-color="#1c1c2a"/>
    </linearGradient>
    <radialGradient id="aurora" cx="30%" cy="40%" r="60%">
      <stop offset="0%" stop-color="rgba(240,165,0,0.35)"/>
      <stop offset="100%" stop-color="rgba(240,165,0,0)"/>
    </radialGradient>
    <radialGradient id="aurora2" cx="75%" cy="70%" r="50%">
      <stop offset="0%" stop-color="rgba(58,42,74,0.6)"/>
      <stop offset="100%" stop-color="rgba(58,42,74,0)"/>
    </radialGradient>
    <radialGradient id="moonGrad" cx="35%" cy="35%" r="65%">
      <stop offset="0%" stop-color="#ffd98a"/>
      <stop offset="55%" stop-color="#f0a500"/>
      <stop offset="100%" stop-color="#b87f00"/>
    </radialGradient>
  </defs>

  <rect width="1200" height="630" fill="url(#sky)"/>
  <rect width="1200" height="630" fill="url(#aurora)"/>
  <rect width="1200" height="630" fill="url(#aurora2)"/>

  <!-- Stars -->
  <g fill="#f5f0e8">
    <circle cx="80" cy="60" r="1.6"/>
    <circle cx="160" cy="120" r="1.1"/>
    <circle cx="220" cy="40" r="0.9"/>
    <circle cx="340" cy="90" r="1.4"/>
    <circle cx="420" cy="150" r="0.8"/>
    <circle cx="520" cy="50" r="1.2"/>
    <circle cx="640" cy="120" r="0.9"/>
    <circle cx="760" cy="60" r="1.5"/>
    <circle cx="880" cy="180" r="1"/>
    <circle cx="980" cy="80" r="1.2"/>
    <circle cx="1080" cy="160" r="1.4"/>
    <circle cx="1140" cy="40" r="0.8"/>
    <circle cx="60" cy="240" r="1"/>
    <circle cx="180" cy="320" r="1.3"/>
    <circle cx="300" cy="280" r="0.8"/>
    <circle cx="540" cy="380" r="1"/>
    <circle cx="700" cy="320" r="1.2"/>
    <circle cx="840" cy="420" r="0.9"/>
    <circle cx="1100" cy="300" r="1.1"/>
    <circle cx="1180" cy="500" r="1.3"/>
    <circle cx="40" cy="520" r="0.9"/>
    <circle cx="200" cy="560" r="1.2"/>
  </g>

  <!-- Moon -->
  <g transform="translate(950,180)">
    <circle r="120" fill="url(#moonGrad)" opacity="0.95"/>
    <circle cx="42" cy="-22" r="105" fill="#0a0a0f"/>
  </g>

  <!-- Wordmark -->
  <g transform="translate(90,330)">
    <text x="0" y="0" font-family="Playfair Display, Georgia, serif" font-size="120" font-weight="700" fill="#f5f0e8">Kahaniyo</text>
    <text x="6" y="60" font-family="DM Sans, Helvetica, Arial, sans-serif" font-size="32" font-weight="500" fill="#a8a39a">Personalized AI bedtime stories</text>
    <text x="6" y="100" font-family="DM Sans, Helvetica, Arial, sans-serif" font-size="32" font-weight="500" fill="#a8a39a">for children — with cultural soul.</text>
  </g>

  <!-- Tag pill -->
  <g transform="translate(96,500)">
    <rect rx="999" ry="999" width="320" height="56" fill="#f0a500"/>
    <text x="160" y="36" text-anchor="middle" font-family="DM Sans, Helvetica, Arial, sans-serif" font-size="20" font-weight="700" fill="#0a0a0f" letter-spacing="2">START TONIGHT'S STORY</text>
  </g>
</svg>
